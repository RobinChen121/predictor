name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main   # 每次 push main 就触发

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v3

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📦 安装依赖
        run: npm install

      - name: 🏗️ 构建项目
        run: npm run build

      - name: 🚀 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
